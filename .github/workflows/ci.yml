name: CI

on:
  push:
    branches: ["master", "staging"]
  pull_request:
    branches: ["master", "staging"]

jobs:

  # ── Backend ────────────────────────────────────────────────────────────────

  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  backend-test:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v

  backend-integration:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bridge
          POSTGRES_PASSWORD: bridge
          POSTGRES_DB: bridgeapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7-jammy
        env:
          MONGO_INITDB_ROOT_USERNAME: bridge
          MONGO_INITDB_ROOT_PASSWORD: bridge
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    # The integration conftest reads TEST_* vars (not DATABASE_URL).
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://bridge:bridge@localhost:5432/bridgeapi_test
      TEST_MONGO_URL: mongodb://bridge:bridge@localhost:27017/bridgelogs_test?authSource=admin
      TEST_REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration/ -v

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json  # fix: was package.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint

  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json  # fix: was package.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --coverage

  # ── Docker build + push to GHCR (push only, after all tests pass) ─────────

  docker-build-push:
    name: Docker — Build & Push to GHCR
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - backend-integration
      - frontend-lint
      - frontend-test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image prefix
        id: vars
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${REPO}-backend" >> $GITHUB_OUTPUT
          echo "frontend_image=ghcr.io/${REPO}-frontend" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ steps.vars.outputs.backend_image }}:${{ github.sha }}
            ${{ steps.vars.outputs.backend_image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.vars.outputs.frontend_image }}:${{ github.sha }}
            ${{ steps.vars.outputs.frontend_image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
