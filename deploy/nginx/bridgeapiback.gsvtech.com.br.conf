# Bridge API — BACKEND (FastAPI/uvicorn em 127.0.0.1:8000)
# Instalar em: /etc/nginx/conf.d/bridgeapiback.gsvtech.com.br.conf
#
# Este arquivo começa só com HTTP (porta 80). Rode:
#   certbot --nginx -d bridgeapiback.gsvtech.com.br
# e o certbot injeta o bloco 443 (TLS) + redirect 80 -> 443 automaticamente.
#
# Observações:
#   - SSE: /jobs/{id}/stream e /status/stream usam Server-Sent Events.
#     proxy_buffering off + read_timeout alto são obrigatórios.
#   - Execução híbrida do proxy: caminho síncrono pode segurar até ~90s,
#     e chamadas à upstream até ~300s. proxy_read_timeout cobre isso.

upstream bridge_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name bridgeapiback.gsvtech.com.br;

    # Upload de logo: 5 MB no backend; folga aqui.
    client_max_body_size 10m;

    location / {
        proxy_pass http://bridge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE + execução híbrida longa: sem buffer e timeouts generosos.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }
}
