# Bridge API — FRONTEND (Next.js standalone em 127.0.0.1:3000)
# Instalar em: /etc/nginx/conf.d/bridgeapi.gsvtech.com.br.conf
#
# Este arquivo começa só com HTTP (porta 80). Rode:
#   certbot --nginx -d bridgeapi.gsvtech.com.br
# e o certbot injeta o bloco 443 (TLS) + redirect 80 -> 443 automaticamente.

upstream bridge_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name bridgeapi.gsvtech.com.br;

    # Logo / assets podem crescer; mantém folga.
    client_max_body_size 10m;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://bridge_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
