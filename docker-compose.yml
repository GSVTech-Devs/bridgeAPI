services:
  postgres:
    image: postgres:16-alpine
    container_name: bridge_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bridge}
      POSTGRES_DB: ${POSTGRES_DB:-bridgeapi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bridge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: bridge_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-bridge}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-bridge}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-bridgelogs}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bridge_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-bridge}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-bridge}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  redis_data:
