# Production overrides — políticas de restart para rodar como serviço na VPS.
# Usage (na VPS, dentro de /opt/bridge):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile db --profile app up -d --build
#
# Pré-requisitos no .env (ver .env.production.example):
#   BIND_IP=127.0.0.1                                   (nginx no host faz o proxy)
#   NEXT_PUBLIC_API_URL=https://bridgeapiback.gsvtech.com.br
#   CORS_ORIGINS=https://bridgeapi.gsvtech.com.br
#   DATABASE_URL / MONGO_URL / REDIS_URL apontando para os containers
#     (postgres / mongo / redis), já que tudo roda na mesma VPS/rede compose.

services:
  postgres:
    restart: unless-stopped

  mongo:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  migrator:
    restart: "no"   # one-shot: roda as migrations e encerra

  backend:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
